services:
  db:
    image: postgres:15-alpine
    container_name: postgres-db-grinnix-food-modular
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  spring-app:
    build: .
    container_name: spring-boot-app-modular
    ports:
      - "9087:9087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: secret
      PORT: 9087
      MAIL_HOG_HOST: mailhog
    depends_on:
      db:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog-grinnix-food-modular
    ports:
      - "1025:1025"
      - "8025:8025" # Web UI
    restart: unless-stopped

  k6:
    image: grafana/k6
    container_name: k6-load-test-modular
    volumes:
      - ./scripts:/scripts:ro
    command: run /scripts/load-test.js
    depends_on:
      - spring-app

volumes:
  pgdata:
